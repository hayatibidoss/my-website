<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f5f5f5;
            color: #333;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 350px;
            background-color: #ffffff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .header {
            padding: 20px;
            background-color: #475569;
            color: white;
        }

        .header h1 {
            margin: 0;
            font-size: 1.25rem;
        }

        .control-panel {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
        }

        .value-display {
            font-weight: bold;
            min-width: 40px;
            text-align: right;
        }

        /* Results Panel */
        #results {
            margin-top: auto;
            padding: 20px;
            background-color: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        .result-line {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        
        .result-line span {
            font-weight: bold;
            color: #2563eb;
        }

        .error {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        /* Graph Canvas Container */
        #graph-container {
            flex: 1;
            position: relative;
            background-color: #fafafa;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .instructions {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.8);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #64748b;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>Definite Integral Calculator</h1>
        </div>

        <div class="control-panel">
            <div class="input-group">
                <label for="fx">Function f(x)</label>
                <input type="text" id="fx" value="x^2 - 2*x - 1" placeholder="e.g., x^2, sin(x), Math.exp(x)">
                <div id="error-msg" class="error">Invalid mathematical expression.</div>
            </div>

            <div class="input-group slider-container">
                <label for="param-a">Lower Bound (a)</label>
                <div class="slider-row">
                    <input type="range" id="param-a" min="-5" max="5" step="0.1" value="-1">
                    <span id="val-a" class="value-display">-1</span>
                </div>
            </div>

            <div class="input-group slider-container">
                <label for="param-b">Upper Bound (b)</label>
                <div class="slider-row">
                    <input type="range" id="param-b" min="-5" max="5" step="0.1" value="3">
                    <span id="val-b" class="value-display">3</span>
                </div>
            </div>
        </div>

        <div id="results">
            <div class="result-line">∫ f(x) dx ≈ <span id="integral-value">0.000</span></div>
        </div>
    </div>

    <div id="graph-container">
        <canvas id="graphCanvas"></canvas>
        <div class="instructions">Drag canvas to pan. Scroll to zoom.</div>
    </div>

    <script>

        const valB = document.getElementById('val-b');
        const integralValueDisplay = document.getElementById('integral-value');

            scaleX: 40, // Pixels per unit

        let isDragging = false;
        let startX, startY;

        // Initialize Canvas Size
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            if(config.offsetX === 0 && config.offsetY === 0) {
                config.offsetX = canvas.width / 2;
                config.offsetY = canvas.height / 2;
            }
            draw();
        }

                .replace(/e/g, 'Math.E')
                .replace(/\^/g, '**'); // exponent notation

            // Return an executable function
            return new Function('x', `return ${formatted};`);
        }
